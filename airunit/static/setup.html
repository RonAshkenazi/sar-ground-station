<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AirUnit Setup</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .title {
      font-size: 1.6rem;
      font-weight: 700;
      color: #e0e0e0;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #8892a4;
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #a0aab8;
      margin-bottom: 6px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      background: #0f1b2d;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 1rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: #4a9eff;
    }

    input::placeholder {
      color: #4a5568;
    }

    button {
      width: 100%;
      background: #1a6ef5;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      margin-top: 8px;
      padding: 14px;
      transition: background 0.2s, opacity 0.2s;
    }

    button:hover:not(:disabled) {
      background: #2e7ff7;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #status {
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      margin-top: 18px;
      min-height: 40px;
      padding: 10px 14px;
      text-align: center;
      display: none;
    }

    #status.visible { display: block; }
    #status.yellow  { background: #2d2500; color: #fbbf24; border: 1px solid #92400e; }
    #status.green   { background: #052e16; color: #4ade80; border: 1px solid #166534; }
    #status.red     { background: #2d0a0a; color: #f87171; border: 1px solid #7f1d1d; }

    .logo {
      font-size: 2rem;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📡</div>
    <div class="title">AirUnit Setup</div>
    <div class="subtitle">Configure network connection</div>

    <div class="field">
      <label for="ssid">WiFi Network (SSID)</label>
      <input type="text" id="ssid" placeholder="Network name" autocomplete="off" autocapitalize="none" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Leave blank if open" autocomplete="off" />
    </div>

    <div class="field">
      <label for="gs_url">Ground Station URL</label>
      <input type="text" id="gs_url" placeholder="http://192.168.1.100:8000" value="http://192.168.1.100:8000" autocomplete="off" autocapitalize="none" />
    </div>

    <button id="connect-btn" onclick="handleConnect()">Connect</button>

    <div id="status"></div>
  </div>

  <script>
    function setStatus(msg, color) {
      const el = document.getElementById("status");
      el.textContent = msg;
      el.className = "visible " + color;
    }

    async function handleConnect() {
      const ssid    = document.getElementById("ssid").value.trim();
      const password = document.getElementById("password").value;
      const gs_url  = document.getElementById("gs_url").value.trim();

      if (!ssid) {
        setStatus("Please enter a WiFi network name.", "red");
        return;
      }

      const btn = document.getElementById("connect-btn");
      btn.disabled = true;
      setStatus("Connecting...", "yellow");

      try {
        const resp = await fetch("/setup/connect", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ssid, password, ground_station_url: gs_url }),
        });

        const data = await resp.json();

        if (data.ok) {
          setStatus("Connected! IP: " + (data.ip || "unknown"), "green");
          // Button stays disabled — provisioning done
        } else {
          setStatus("Failed: " + (data.message || "Unknown error") + ". Try again.", "red");
          btn.disabled = false;
        }
      } catch (err) {
        setStatus("Error: could not reach Pi", "red");
        btn.disabled = false;
      }
    }

    // Allow Enter key to submit
    document.addEventListener("keydown", function(e) {
      if (e.key === "Enter") handleConnect();
    });
  </script>
</body>
</html>
